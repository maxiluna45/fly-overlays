name: Build and Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*.[0-9]*.[0-9]*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build setup .exe (NSIS)
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No publicar desde electron-builder, lo hace el step de abajo
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify latest.yml was generated
        run: |
          if (-not (Test-Path "release/latest.yml")) {
            Write-Error "ERROR: latest.yml was not generated by electron-builder"
            exit 1
          }
          Write-Host "OK: latest.yml exists"
          Get-ChildItem release/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/latest.yml
            release/latest.yml.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
